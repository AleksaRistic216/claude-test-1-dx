name: Screenshot Tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: Update screenshot baselines
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Restore baselines
        run: |
          if git ls-remote --exit-code origin screenshot-tests-baseline > /dev/null 2>&1; then
            git fetch origin screenshot-tests-baseline
            mkdir -p tests/__snapshots__
            git archive FETCH_HEAD | tar -x -C tests/__snapshots__
          fi

      - name: Build
        run: npm run build

      - name: Run screenshot tests
        run: |
          if [ "${{ inputs.update_snapshots }}" = "true" ]; then
            npx playwright test --update-snapshots
          else
            npx playwright test
          fi
        continue-on-error: ${{ inputs.update_snapshots == true }}

      - name: Push updated baselines
        if: inputs.update_snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -r tests/__snapshots__ /tmp/new-snapshots

          if git ls-remote --exit-code origin screenshot-tests-baseline > /dev/null 2>&1; then
            git fetch origin screenshot-tests-baseline
            git checkout -B screenshot-tests-baseline origin/screenshot-tests-baseline
          else
            git checkout --orphan screenshot-tests-baseline
            git rm -rf . --quiet 2>/dev/null || true
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -r /tmp/new-snapshots/. .

          git add -A
          if git diff --staged --quiet; then
            echo "Baselines unchanged"
          else
            git commit -m "Update screenshot baselines [skip ci]"
            git push origin screenshot-tests-baseline
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
